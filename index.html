<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>~</title>
		<link rel=" shortcut icon" type="image/png" href="assets/icons/favicon.png" />
		<link rel="stylesheet" href="app.css" />
		<script src="https://unpkg.com/lucide@latest"></script>
	</head>

	<body class="">
		<button id="themeButton">
			<i id="themeIcon" icon-name="moon"></i>
		</button>
		<div class="container">
			<!-- i3-style header bar -->
			<div class="header-bar">
				<div class="header-left" id="wsTags">
					<!-- populated by layout.js -->
				</div>
				<div class="header-right">
					<span class="header-info" id="header-weather"></span>
					<span class="header-info" id="header-date"></span>
					<span class="header-info" id="header-time"></span>
				</div>
			</div>

			<!-- Clock and Greetings -->
			<div class="timeBlock">
				<div class="clock">
					<div id="hour"></div>
					<div id="separator"></div>
					<div id="minutes"></div>
				</div>
				<div id="greetings"></div>
			</div>

			<div class="separator-line"></div>

			<!-- Shell prompt showing ls -->
			<div class="prompt">
				<span class="prompt-user">jan</span><span class="prompt-at">@</span><span class="prompt-host">arch</span>
				<span class="prompt-path" id="promptPath">~/bookmarks/general</span>
				<span class="prompt-symbol">$</span>
				<span class="prompt-cmd">ls</span>
			</div>

			<!-- ls output: bookmarks rendered as flat file listing -->
			<div class="ls-output" id="lsOutput"></div>

			<div class="separator-line"></div>

		</div>

		<!-- Config  -->
		<script src="config.js"></script>

		<!-- Scripts  -->
		<script src="assets/js/layout.js"></script>
		<script src="assets/js/theme.js"></script>
		<script src="assets/js/time.js"></script>
		<script src="assets/js/greeting.js"></script>
		<script src="assets/js/weather.js"></script>

		<!-- Icons -->
		<script>
			lucide.createIcons();
		</script>
	</body>
</html>
